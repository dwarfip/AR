<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR Box Stereoscopic MR</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
      font-family: monospace;
    }

    /* Container utama pembelah layar */
    .vr-container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* Membagi layar menjadi 2 bagian presisi (Kiri & Kanan) */
    .view-pane {
      width: 50vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Video Kamera Belakang sebagai Passthrough */
    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* KANVAS GRAFIS 3D MR (Melayang di atas kamera) */
    /* Menggunakan sistem 3D CSS Renderer untuk mengunci objek di ruang nyata */
    .space-3d {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 5;
      perspective: 600px; /* Memberikan efek kedalaman 3D */
    }

    /* Objek Panel AR yang akan bergerak berlawanan dengan rotasi kepala */
    .mr-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 260px;
      height: 160px;
      margin-left: -130px; /* Menaruh tepat di titik tengah */
      margin-top: -80px;
      background: rgba(0, 20, 40, 0.75);
      border: 3px solid #00ffcc;
      border-radius: 8px;
      padding: 12px;
      color: #00ffcc;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
      box-sizing: border-box;
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform 0.05s linear; /* Membuat gerakan halus */
    }

    .panel-header {
      font-size: 12px;
      font-weight: bold;
      border-bottom: 1px solid #00ffcc;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    .panel-body {
      font-size: 11px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Struktur Dua Belah Layar (Stereoskopik) -->
  <div class="vr-container">
    
    <!-- MATA KIRI -->
    <div class="view-pane" id="left-pane">
      <video class="cam-feed" autoplay playsinline muted></video>
      <div class="space-3d">
        <div class="mr-panel" id="panel-left">
          <div class="panel-header">MR SYSTEM: MATA KIRI</div>
          <div class="panel-body">
            <p>> GYRO: LATCHED</p>
            <p>> PASSTHROUGH: TRUE</p>
            <p>> STATUS: LOCKED IN SPACE</p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- MATA KANAN (Identik dengan kiri untuk ilusi 3D di otak) -->
    <div class="view-pane" id="right-pane">
      <video class="cam-feed" autoplay playsinline muted></video>
      <div class="space-3d">
        <div class="mr-panel" id="panel-right">
          <div class="panel-header">MR SYSTEM: MATA KANAN</div>
          <div class="panel-body">
            <p>> GYRO: LATCHED</p>
            <p>> PASSTHROUGH: TRUE</p>
            <p>> STATUS: LOCKED IN SPACE</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // 1. Mengaktifkan Kamera Belakang ke Kedua Belah Layar
    navigator.mediaDevices.getUserMedia({
      audio: false,
      video: { facingMode: { ideal: "environment" } }
    })
    .then(function(stream) {
      const videos = document.querySelectorAll('.cam-feed');
      videos.forEach(video => {
        video.srcObject = stream;
        video.play();
      });
    })
    .catch(function(err) {
      alert("Akses kamera ditolak. Berikan izin di Chrome.");
    });

    // 2. LOGIKA JANGKAR MR: Membaca Sensor Gyroscope HP
    const panelLeft = document.getElementById('panel-left');
    const panelRight = document.getElementById('panel-right');

    window.addEventListener('deviceorientation', function(event) {
      // alpha: perputaran kepala tengok kanan/kiri (0 sampai 360 derajat)
      // beta: dongakan kepala dongak atas/bawah
      let alpha = event.alpha;
      let beta = event.beta;

      if (alpha !== null && beta !== null) {
        // Trik Matematika MR: 
        // Saat kepala Anda menengok ke KANAN (alpha mengecil), objek kita geser ke KIRI (minus)
        // Ini menciptakan ilusi bahwa panel digital tertinggal diam di ruang nyata!
        let xOffset = (alpha * 3); // Pengali sensitivitas gerakan horizontal
        let yOffset = ((beta - 45) * 3); // Pengali sensitivitas gerakan vertikal (diasumsikan HP miring 45 derajat)

        // Terapkan posisi baru secara bersamaan ke mata kiri dan kanan
        panelLeft.style.transform = `translate(${-xOffset}px, ${yOffset}px)`;
        panelRight.style.transform = `translate(${-xOffset}px, ${yOffset}px)`;
      }
    }, true);
  </script>

</body>
</html>
