<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Box Passthrough Chrome</title>
  <!-- Menghubungkan library A-Frame versi stabil -->
  <script src="https://aframe.io"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene>
    <!-- Tempat memuat aset video kamera -->
    <a-assets>
      <video id="webcam" autoplay playsinline webkit-playsinline muted loop></video>
    </a-assets>

    <!-- Kamera utama pengguna -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Layar proyeksi video kamera (Menempel di depan pandangan) -->
    <a-plane id="camera-screen" src="#webcam" position="0 0 -2" width="4" height="3"></a-plane>

    <!-- CONTOH OBJEK 3D: Kotak merah melayang yang bisa dilihat lewat VR Box -->
    <a-box position="0 0 -1.5" material="color: red;" animation="property: rotation; to: 0 360 360; loop: true; dur: 5000" scale="0.3 0.3 0.3"></a-box>
  </a-scene>

  <script>
    // Konfigurasi wajib untuk meminta kamera belakang HP
    const constraints = {
      audio: false,
      video: {
        facingMode: { ideal: "environment" } // Mengutamakan kamera belakang
      }
    };

    // Mengaktifkan kamera lewat browser Chrome
    navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      const video = document.getElementById('webcam');
      video.srcObject = stream;
      video.onloadedmetadata = function(e) {
        video.play();
      };
    })
    .catch(function(err) {
      console.log("Error akses kamera: ", err);
      // Cadangan jika kamera belakang tidak terdeteksi (mencoba kamera apa saja)
      navigator.mediaDevices.getUserMedia({ audio: false, video: true })
      .then(function(stream) {
        const video = document.getElementById('webcam');
        video.srcObject = stream;
        video.play();
      })
      .catch(function(e) {
        alert("Gagal memuat kamera. Pastikan izin kamera diizinkan di Chrome.");
      });
    });
  </script>
</body>
</html>
