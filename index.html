<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR Box AR HUD Standard</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
      font-family: monospace;
    }

    /* Wadah utama pembelah layar */
    .vr-container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* Membagi layar menjadi 2 bagian presisi (Kiri & Kanan) */
    .view-pane {
      width: 50vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Umpan Kamera Belakang sebagai Passthrough */
    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* PANEL AR (Menempel kokoh di atas tengah layar) */
    .ar-panel {
      position: relative;
      width: 75%;
      height: 45%;
      background: rgba(0, 20, 40, 0.7); /* Biru gelap transparan */
      border: 3px solid #00ffcc; /* Bingkai hijau neon */
      border-radius: 8px;
      padding: 12px;
      color: #00ffcc;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
      z-index: 9999; /* Memaksa panel berada di lapisan paling atas */
      box-sizing: border-box;
    }

    .panel-header {
      font-size: 12px;
      font-weight: bold;
      border-bottom: 1px solid #00ffcc;
      padding-bottom: 4px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .panel-body {
      font-size: 11px;
      line-height: 1.4;
    }

    /* Efek teks berkedip untuk indikator online */
    .status-blink {
      animation: blinker 1s linear infinite;
    }
    @keyframes blinker {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="vr-container">
    
    <!-- MATA KIRI -->
    <div class="view-pane">
      <video class="cam-feed" autoplay playsinline muted></video>
      <div class="ar-panel">
        <div class="panel-header">
          <span>AR HUD: LEFT_EYE</span>
          <span class="status-blink">[● ONLINE]</span>
        </div>
        <div class="panel-body">
          <p>> SYSTEM: CONNECTED</p>
          <p>> CAMERA: REAR_ACTIVE</p>
          <p>> MODE: STEREOSCOPIC</p>
        </div>
      </div>
    </div>
    
    <!-- MATA KANAN (Identik agar nyaman menyatu di otak) -->
    <div class="view-pane">
      <video class="cam-feed" autoplay playsinline muted></video>
      <div class="ar-panel">
        <div class="panel-header">
          <span>AR HUD: RIGHT_EYE</span>
          <span class="status-blink">[● ONLINE]</span>
        </div>
        <div class="panel-body">
          <p>> SYSTEM: CONNECTED</p>
          <p>> CAMERA: REAR_ACTIVE</p>
          <p>> MODE: STEREOSCOPIC</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Meminta izin kamera belakang HP
    navigator.mediaDevices.getUserMedia({
      audio: false,
      video: { facingMode: { ideal: "environment" } }
    })
    .then(function(stream) {
      const videos = document.querySelectorAll('.cam-feed');
      videos.forEach(video => {
        video.srcObject = stream;
        video.play();
      });
    })
    .catch(function(err) {
      alert("Nyalakan izin kamera di Chrome.");
    });
  </script>

</body>
</html>
