<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR Box Dual Screen Camera Fix</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
    }

    /* Wadah utama pembelah layar */
    .vr-container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* Membagi layar menjadi 2 bagian presisi (Kiri & Kanan) */
    .view-pane {
      width: 50vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Menjaga garis pembatas tengah agar mata fokus */
    .view-pane::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(255, 255, 255, 0.2);
    }
    #left-pane::after { right: 0; }
    #right-pane::after { left: 0; }

    /* Memaksa elemen video dan objek mengikuti porsi layar VR Box */
    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
    }

    /* Efek Target AR (Kotak/Target Bidik) di tengah-tengah pandangan */
    .ar-target {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 40px;
      height: 40px;
      border: 3px solid #ff0055;
      border-radius: 6px;
      transform: translate(-50%, -50%) rotate(45deg);
      box-shadow: 0 0 10px #ff0055;
      animation: pulse 2s infinite;
      z-index: 10;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) rotate(45deg) scale(0.9); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) rotate(45deg) scale(1.1); opacity: 1; }
      100% { transform: translate(-50%, -50%) rotate(45deg) scale(0.9); opacity: 0.6; }
    }
  </style>
</head>
<body>

  <!-- Struktur Dual Tampilan Mata untuk VR Box -->
  <div class="vr-container">
    
    <!-- MATA KIRI -->
    <div class="view-pane" id="left-pane">
      <video class="cam-feed" autoplay playsinline muted></video>
      <div class="ar-target"></div>
    </div>
    
    <!-- MATA KANAN -->
    <div class="view-pane" id="right-pane">
      <video class="cam-feed" autoplay playsinline muted></video>
      <div class="ar-target"></div>
    </div>

  </div>

  <script>
    // Meminta akses satu aliran kamera belakang
    navigator.mediaDevices.getUserMedia({
      audio: false,
      video: { facingMode: { ideal: "environment" } }
    })
    .then(function(stream) {
      // Mengkloning satu aliran kamera ke dua elemen video (kiri & kanan) sekaligus
      const videos = document.querySelectorAll('.cam-feed');
      videos.forEach(video => {
        video.srcObject = stream;
        video.onloadedmetadata = function() {
          video.play();
        };
      });
    })
    .catch(function(err) {
      alert("Akses kamera ditolak atau tidak didukung di HTTPS ini. Periksa izin Chrome Anda.");
    });
  </script>

</body>
</html>
