<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Box Manual Split Screen</title>
  <!-- Menggunakan A-Frame versi yang mendukung pemaksa WebXR -->
  <script src="https://aframe.io"></script>
  <style>
    /* Membuat tombol kustom di atas layar untuk memaksa masuk mode VR */
    #custom-vr-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 80px;
      height: 50px;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      border: 2px solid white;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
      z-index: 9999;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <!-- Tombol VR Paksaan buatan sendiri -->
  <button id="custom-vr-btn">MASUK VR</button>

  <!-- Menggunakan embedded agar ukurannya bisa dikontrol penuh oleh layar HP -->
  <a-scene embedded style="width: 100vw; height: 100vh;">
    <a-assets>
      <video id="webcam" autoplay playsinline webkit-playsinline muted loop></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Layar proyeksi video kamera belakang -->
    <a-plane id="camera-screen" src="#webcam" position="0 0 -2" width="4" height="3"></a-plane>

    <!-- Kotak merah melayang di dunia VR -->
    <a-box position="0 0 -1.5" material="color: red;" animation="property: rotation; to: 0 360 360; loop: true; dur: 5000" scale="0.3 0.3 0.3"></a-box>
  </a-scene>

  <script>
    // Ambil elemen scene dan tombol kustom
    const scene = document.querySelector('a-scene');
    const vrBtn = document.getElementById('custom-vr-btn');

    // Ketika tombol tiruan diklik, paksa A-Frame masuk mode VR (Split Screen)
    vrBtn.addEventListener('click', function () {
      if (scene.enterVR) {
        scene.enterVR();
        vrBtn.style.display = 'none'; // Sembunyikan tombol setelah masuk VR
      } else {
        alert("Browser Anda memblokir fungsi VR. Pastikan izin VR di Chrome sudah aktif.");
      }
    });

    // Mengaktifkan kamera belakang HP
    const constraints = {
      audio: false,
      video: { facingMode: { ideal: "environment" } }
    };

    navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      const video = document.getElementById('webcam');
      video.srcObject = stream;
      video.onloadedmetadata = function(e) { video.play(); };
    })
    .catch(function(err) {
      // Cadangan kamera jika gagal
      navigator.mediaDevices.getUserMedia({ audio: false, video: true })
      .then(function(stream) {
        const video = document.getElementById('webcam');
        video.srcObject = stream;
        video.play();
      });
    });
  </script>
</body>
</html>
