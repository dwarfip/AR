<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Box Pure VR 6DoF A-Frame</title>
  <!-- Memuat library A-Frame terbaru -->
  <script src="https://aframe.io"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <!-- Kamera belakang disembunyikan, murni sebagai sensor gerak -->
  <video id="hidden-video" autoplay playsinline muted style="position:absolute; width:100px; height:100px; opacity:0; z-index:-1;"></video>
  <canvas id="analyzer-canvas" width="40" height="30" style="display:none;"></canvas>

  <!-- Scene VR Murni (Latar belakang gelap, bukan passthrough) -->
  <!-- cardboardModeEnabled memaksa tampilan terbelah dua untuk VR Box saat tombol kacamata ditekan -->
  <a-scene vr-mode-ui="cardboardModeEnabled: true" background="color: #05070a">
    
    <!-- Kamera Utama A-Frame: Otomatis membaca Gyroscope HP -->
    <a-camera id="main-cam" position="0 1.6 0" look-controls="enabled: true"></a-camera>

    <!-- OBJEK UTAMA: Kotak VR yang posisinya terkunci di ruang virtual -->
    <!-- Ukurannya akan diubah secara dinamis oleh JavaScript di bawah -->
    <a-box id="vr-target" 
           position="0 1.6 -2.5" 
           rotation="0 45 45" 
           width="0.8" height="0.8" depth="0.8"
           material="color: #ff0055; opacity: 0.8; wireframe: false;"
           animation="property: rotation; to: 0 360 360; loop: true; dur: 8000">
    </a-box>

    <!-- Menambahkan lantai kisi-kisi (grid) digital agar efek gerak maju/mundur lebih terasa nyata -->
    <a-grid material="color: #00ffcc; opacity: 0.2;"></a-grid>

  </a-scene>

  <script>
    const video = document.getElementById('hidden-video');
    const canvas = document.getElementById('analyzer-canvas');
    const ctx = canvas.getContext('2d');
    const vrTarget = document.getElementById('vr-target');

    let baseBrightness = null;
    let currentScale = 1.0;

    // 1. Mengaktifkan sensor kamera belakang HP
    navigator.mediaDevices.getUserMedia({ 
      audio: false, 
      video: { facingMode: { ideal: "environment" } } 
    })
    .then(stream => { video.srcObject = stream; })
    .catch(() => { alert("Akses kamera belakang diperlukan sebagai sensor 6DoF."); });

    // 2. Loop AI Pengolah Skala 6DoF (60 FPS)
    setInterval(() => {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        let totalBrightness = 0;
        for (let i = 0; i < data.length; i += 4) {
          totalBrightness += (data[i] + data[i+1] + data[i+2]) / 3;
        }
        let avgBrightness = totalBrightness / (data.length / 4);
        
        if (baseBrightness === null) { baseBrightness = avgBrightness; }

        // Hitung selisih cahaya untuk mendeteksi maju / mundur
        let delta = avgBrightness - baseBrightness;

        if (delta > 2) {
          currentScale += 0.03; // Respons maju lebih cepat
        } else if (delta < -2) {
          currentScale -= 0.03; // Respons mundur
        } else {
          // Sistem stabilisasi otomatis: kembalikan ke skala normal (1.0) jika Anda diam
          currentScale += (1.0 - currentScale) * 0.05;
        }

        // KUNCI ANTI-HILANG: Batasi skala terkecil di 0.5 dan terbesar di 2.0
        currentScale = Math.max(0.5, Math.min(2.0, currentScale));

        // Terapkan skala baru ke objek A-Frame (format pengisian: X Y Z)
        vrTarget.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
      }
    }, 1000 / 60);
  </script>
</body>
</html>
