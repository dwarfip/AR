<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR Box Pseudo-MR System</title>
  <!-- Library A-Frame untuk melacak gerakan kepala (Gyroscope) -->
  <script src="https://aframe.io"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
    }

    /* Pembagi Layar Fisik (Kiri & Kanan) untuk VR Box */
    .vr-container {
      display: flex;
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10; /* Di atas kamera */
      pointer-events: none; /* Mengizinkan interaksi tembus ke scene */
    }

    .view-pane {
      width: 50vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Background Kamera Belakang Nyata (Full Screen di Lapisan Paling Bawah) */
    #bg-camera {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      top: 0;
      left: 0;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- 1. LATAR BELAKANG: Kamera Nyata Dunia Asli -->
  <video id="bg-camera" autoplay playsinline muted></video>

  <!-- 2. GRAFIS 3D: A-Frame yang otomatis membelah layar secara internal -->
  <!-- Kita buat latar belakang scene 3D menjadi transparan agar kamera asli di bawahnya terlihat -->
  <a-scene embedded vr-mode-ui="enabled: false" style="position: absolute; width: 100vw; height: 100vh; z-index: 5;">
    
    <!-- Kamera Virtual yang membaca Sensor Gyroscope HP -->
    <!-- Sepasang kamera tiruan (Stereo) otomatis aktif saat masuk mode komparasi -->
    <a-camera position="0 1.6 0" look-controls="enabled: true"></a-camera>

    <!-- OBJEK MR 1: Panel Informasi yang Terkunci di Koordinat Ruangan -->
    <!-- Jika Anda menengok ke kanan, panel ini akan bergeser ke kiri (tertinggal di ruangan asli) -->
    
      <!-- Bingkai Panel -->
      <a-plane width="1.5" height="0.9" material="color: #001428; opacity: 0.7; shader: flat; side: double; border: 2px solid #00ffcc;"></a-plane>
      <!-- Teks di dalam Panel -->
      <a-text value="MR NODE: ACTIVE\n\nObject locked in real space.\nTurn your head to look away." 
              color="#00ffcc" align="center" width="2" position="0 0 0.01"></a-text>
    

    <!-- OBJEK MR 2: Kotak 3D di Sebelah Kanan Anda -->
    <!-- Anda harus menengok ke kanan sebesar 45 derajat untuk melihat kotak ini -->
    <a-box position="2 1.6 -2" rotation="0 45 0" color="#ff0055" scale="0.5 0.5 0.5"
           animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>

    <!-- OBJEK MR 3: Bola 3D di Sebelah Kiri Anda -->
    <a-sphere position="-2 1.6 -2" color="#00ffcc" radius="0.3"></a-sphere>

  </a-scene>

  <!-- 3. TOPENG VR BOX: Memastikan Layar Terbuka dalam Format Split Screen Murni -->
  <div class="vr-container">
    <div class="view-pane" id="left-mask"></div>
    <div class="view-pane" id="right-mask"></div>
  </div>

  <script>
    // 1. Jalankan Kamera Belakang HP untuk Background
    navigator.mediaDevices.getUserMedia({
      audio: false,
      video: { facingMode: { ideal: "environment" } }
    })
    .then(function(stream) {
      const video = document.getElementById('bg-camera');
      video.srcObject = stream;
      video.play();
    })
    .catch(function(err) {
      alert("Akses kamera belakang diperlukan untuk efek Mixed Reality.");
    });

    // 2. Paksa A-Frame untuk langsung masuk ke Mode Split Screen (Stereoscopic) sejak awal
    window.addEventListener('load', function () {
      const sceneEl = document.querySelector('a-scene');
      if (sceneEl.hasLoaded) {
        forceStereo();
      } else {
        sceneEl.addEventListener('loaded', forceStereo);
      }

      function forceStereo() {
        // Trik memaksa WebXR Engine membelah render grafik menjadi Mata Kiri & Kanan
        sceneEl.enterVR(); 
      }
    });
  </script>

</body>
</html>
